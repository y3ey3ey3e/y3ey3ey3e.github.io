<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>???</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script disable-devtool-auto src="https://cdn.jsdelivr.net/npm/disable-devtool@latest" type="text/javascript"></script>
    <script src="js/disablecacat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'VT323', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: default;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        #typewriter {
            font-size: 1.2rem;
            letter-spacing: 1px;
            opacity: 0.8;
            min-height: 30px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background-color: #ffffff;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
            opacity: 0.6;
        }

        @keyframes blink {
            0%, 50% { opacity: 0.6; }
            51%, 100% { opacity: 0; }
        }

        .clickable {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .clickable:hover {
            color: #ff3333;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="typewriter"><span class="cursor"></span></div>
    </div>

    <script>
        const text = "I created you, now I'll end you.";
        const typewriter = document.getElementById('typewriter');
        let index = 0;
        const typingSpeed = 80;
        const pauseBeforeEnd = 400;

        function type() {
            if (index < text.length) {
                const currentText = text.substring(0, index + 1);
                
                if (index === text.length - 1) {
                    const beforeEnd = text.substring(0, text.length - 4);
                    const endWord = text.substring(text.length - 4);
                    typewriter.innerHTML = beforeEnd + '<a href="sara.html" class="clickable" id="endWord">' + endWord + '</a><span class="cursor"></span>';
                    
                    setTimeout(() => {
                        document.querySelector('.cursor').style.display = 'none';
                    }, pauseBeforeEnd);
                } else {
                    typewriter.innerHTML = currentText + '<span class="cursor"></span>';
                }
                
                index++;
                setTimeout(type, typingSpeed);
            }
        }

        setTimeout(type, 500);
    </script>
</body>
</html>
